[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  ".refs",
  "**/__pycache__",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

[tool.ruff.lint]
select = [
  "B",
  "C4",
  "E4",
  "E7",
  "E9",
  "F",
  "I",
  "RET",
  "SIM",
  "UP",
]

[tool.ruff.lint.isort]
known-first-party = ["skill_policy", "skill_router", "evaluate_skill", "skill_creator", "skill_refiner", "memory"]
